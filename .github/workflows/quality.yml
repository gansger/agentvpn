name: Quality

on:
  push:
    branches: [main]
  pull_request:

jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -e ".[dev]"
      - run: python -B -m unittest discover -s tests -p "test_*.py" -v
      - run: python -B infrastructure/scripts/check_python_syntax.py
      - run: ruff check .
      - run: ruff format --check .
      - run: mypy apps infrastructure tests

  clean-postgres-migrations:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: sh infrastructure/scripts/test_clean_postgres_migrations.sh

  caddyfile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: sh infrastructure/scripts/validate_caddy.sh
